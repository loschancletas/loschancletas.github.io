<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla Completa Móvil</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f0f0f0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        /* Estilos específicos cuando está en pantalla completa */
        :fullscreen {
            background-color: #000;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        /* Prefijos para navegadores antiguos */
        :-webkit-full-screen { background-color: #000; color: white; }
        :-moz-full-screen { background-color: #000; color: white; }
        :-ms-fullscreen { background-color: #000; color: white; }
    </style>
</head>
<body>

    <h1>Demo Pantalla Completa</h1>
    <p>Presiona el botón para ocupar toda la pantalla del móvil.</p>
    
    <button id="btnFullscreen">Activar Pantalla Completa</button>

    <script>
        const btn = document.getElementById("btnFullscreen");
        const docEl = document.documentElement;

        btn.addEventListener("click", () => {
            if (!document.fullscreenElement) {
                // Intentar entrar en pantalla completa
                if (docEl.requestFullscreen) {
                    docEl.requestFullscreen();
                } else if (docEl.webkitRequestFullscreen) { /* Safari */
                    docEl.webkitRequestFullscreen();
                } else if (docEl.msRequestFullscreen) { /* IE11 */
                    docEl.msRequestFullscreen();
                }
            } else {
                // Salir de pantalla completa
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* IE11 */
                    document.msExitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
